<!DOCTYPE html>
<html lang="es">
<head>
	<script>(function(){ if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) document.documentElement.classList.add('reduce-motion'); var t = localStorage.getItem('checkTheme') || 'verde'; if (t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'oscuro' : 'verde'; document.documentElement.setAttribute('data-theme', t); })();</script>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Hardware y software que usa LdeLuipy — página /uses.">
	<meta name="theme-color" content="#0c100e">
	<link rel="canonical" href="https://ldeluipy.es/uses.html">
	<link rel="manifest" href="/manifest.webmanifest">
	<link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<title>Uses — LdeLuipy</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/primordial.css">
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<canvas id="matrix-rain" aria-hidden="true"></canvas>

	<div class="container">
		<header>
			<div class="header-title">
				<h1 class="glitch" data-text="Uses">Uses</h1>
				<p class="sub"><a href="/" class="uses-home-link">← LdeLuipy</a></p>
			</div>
			<div class="header-actions">
				<label class="theme-switcher" aria-label="Modo de color">
					<select id="theme-select" title="Modo de color">
						<option value="system">Sistema</option>
						<option value="verde">Verde</option>
						<option value="oscuro">Oscuro</option>
						<option value="matrix">Matrix</option>
					</select>
				</label>
			</div>
		</header>

		<section class="uses-page nav-section" id="section-uses" aria-live="polite">
			<p id="uses-loading" class="hub-muted">Cargando…</p>
			<div id="uses-content" style="display:none;">
				<p id="uses-intro" class="uses-intro"></p>
				<div id="uses-sections"></div>
			</div>
		</section>
	</div>

	<script>
	(function() {
		var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
		if (reduceMotion) {
			document.documentElement.classList.add('reduce-motion');
			return;
		}
		function bootMatrix() {
			var canvas = document.getElementById('matrix-rain');
			if (!canvas) return;
			var ctx = canvas.getContext('2d');
			var chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01';
			var fontSize = 14;
			var columns, drops;
			var konamiSpeed = 1;
			window.addEventListener('ldeluipy-konami', function() {
				konamiSpeed = 4;
				setTimeout(function() { konamiSpeed = 1; }, 12000);
			});
			function init() {
				canvas.width = window.innerWidth;
				canvas.height = window.innerHeight;
				columns = Math.floor(canvas.width / fontSize);
				drops = [];
				for (var i = 0; i < columns; i++) drops[i] = Math.random() * -100;
			}
			init();
			window.addEventListener('resize', init);
			function draw() {
				ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.font = fontSize + 'px "JetBrains Mono", monospace';
				for (var i = 0; i < drops.length; i++) {
					var char = chars[Math.floor(Math.random() * chars.length)];
					var x = i * fontSize;
					var y = drops[i] * fontSize;
					ctx.fillStyle = Math.random() > 0.9 ? '#fff' : '#00ffa6';
					ctx.globalAlpha = Math.random() > 0.9 ? 0.9 : 0.25 + Math.random() * 0.35;
					ctx.fillText(char, x, y);
					if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
					drops[i] += konamiSpeed;
				}
				ctx.globalAlpha = 1;
				requestAnimationFrame(draw);
			}
			draw();
		}
		if ('requestIdleCallback' in window) requestIdleCallback(bootMatrix, { timeout: 2200 });
		else window.addEventListener('load', function() { setTimeout(bootMatrix, 400); });
	})();
	</script>

	<script>
	(function() {
		var sel = document.getElementById('theme-select');
		if (!sel) return;
		function resolveSystem() {
			return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'oscuro' : 'verde';
		}
		function applyDataTheme(t) {
			document.documentElement.setAttribute('data-theme', t === 'system' ? resolveSystem() : t);
		}
		var stored = localStorage.getItem('checkTheme');
		if (!stored || !['system', 'verde', 'oscuro', 'matrix'].includes(stored)) stored = 'verde';
		sel.value = stored;
		applyDataTheme(stored);
		sel.addEventListener('change', function() {
			localStorage.setItem('checkTheme', this.value);
			applyDataTheme(this.value);
		});
		var mq = window.matchMedia('(prefers-color-scheme: dark)');
		function onScheme() { if (sel.value === 'system') applyDataTheme('system'); }
		if (mq.addEventListener) mq.addEventListener('change', onScheme);
		else if (mq.addListener) mq.addListener(onScheme);
	})();
	</script>

	<script>
	(function() {
		var loadEl = document.getElementById('uses-loading');
		var content = document.getElementById('uses-content');
		var intro = document.getElementById('uses-intro');
		var wrap = document.getElementById('uses-sections');

		function renderStatic() {
			if (loadEl) loadEl.style.display = 'none';
			if (content) content.style.display = 'block';
			if (intro) {
				intro.textContent = 'Listado de herramientas y entorno. Los datos detallados viven en /data/hub.json (clave «uses»).';
			}
			if (wrap) {
				wrap.innerHTML = '';
				var sec = document.createElement('section');
				sec.className = 'uses-block';
				sec.innerHTML = '<h2>Hosting</h2><ul><li>Ubuntu, Apache, Let\'s Encrypt</li></ul><h2>Desarrollo</h2><ul><li>Cursor / VS Code, git, bash</li></ul>';
				wrap.appendChild(sec);
			}
		}

		fetch('/data/hub.json', { cache: 'no-store' })
			.then(function(r) {
				if (!r.ok) throw new Error('hub.json');
				return r.json();
			})
			.then(function(hub) {
				var u = hub.uses;
				if (!u || !u.sections || !u.sections.length) {
					renderStatic();
					return;
				}
				if (loadEl) loadEl.style.display = 'none';
				if (content) content.style.display = 'block';
				if (intro) intro.textContent = u.intro || '';
				document.title = (u.pageTitle || 'Uses') + ' | LdeLuipy';
				wrap.innerHTML = '';
				u.sections.forEach(function(block) {
					var sec = document.createElement('section');
					sec.className = 'uses-block';
					var h2 = document.createElement('h2');
					h2.textContent = block.title || '';
					sec.appendChild(h2);
					var ul = document.createElement('ul');
					(block.items || []).forEach(function(line) {
						var li = document.createElement('li');
						li.textContent = line;
						ul.appendChild(li);
					});
					sec.appendChild(ul);
					wrap.appendChild(sec);
				});
			})
			.catch(function() {
				renderStatic();
				if (intro) {
					var t = intro.textContent;
					intro.textContent = 'No se pudo leer hub.json; mostrando resumen estático. ' + t;
				}
			});
	})();
	</script>

	<script>
	(function() {
		if (!('serviceWorker' in navigator)) return;
		if (location.protocol !== 'https:' && location.hostname !== 'localhost') return;
		navigator.serviceWorker.register('/sw.js').catch(function() {});
	})();
	</script>
</body>
</html>
